name: Validate Prompts

on:
  pull_request:
    paths:
      - "prompts/**"
      - "skills/**"
      - "examples/**"
      - "tests/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate prompt/config pairs
        run: python tests/assertions.py --validate-structure

      - name: Check every prompt has a config sidecar
        shell: bash
        run: |
          set -e
          for f in prompts/*.md; do
            base="${f%.md}"
            if [ ! -f "${base}.config.yaml" ]; then
              echo "::error file=$f::Missing sidecar config ${base}.config.yaml"
              exit 1
            fi
          done