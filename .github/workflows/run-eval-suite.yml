name: Run Eval Suite

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run eval suite against all cases
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          for case in tests/cases/*.cases.yaml; do
            echo "Running $case"
            python tests/runner.py --case "$case"
          done